<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="생두지도">
<meta name="theme-color" content="#3d2b1f">
<title>생두지도 Bean Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --bg:#f6efe6; --panel:#fbf6ee; --ink:#3d2b1f; --sub:#8a7a68;
    --line:#e6d9c8; --accent:#6f4e37; --accent2:#a9744f; --pin:#7a4a2b;
    --green:#5b6b3a; --gold:#b8863b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink); overflow:hidden;
  }
  #app{display:flex; flex-direction:column; height:100dvh;}

  header{padding:env(safe-area-inset-top) 16px 0; background:var(--bg); z-index:5;}
  .brand{display:flex; align-items:baseline; gap:10px; padding:14px 2px 10px;}
  .brand h1{font-size:26px; margin:0; letter-spacing:-.5px;}
  .brand span{font-size:14px; color:var(--sub); font-weight:500;}

  .tabs{display:flex; gap:8px; padding:0 0 10px;}
  .tab{flex:1; padding:12px 0; text-align:center; border:1px solid var(--line);
    border-radius:14px; background:var(--panel); color:var(--sub);
    font-size:15px; font-weight:600; cursor:pointer; transition:.15s;}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .countries{display:flex; gap:8px; overflow-x:auto; padding:0 0 12px; scrollbar-width:none;}
  .countries::-webkit-scrollbar{display:none;}
  .country{flex:0 0 auto; padding:9px 16px; border:1px solid var(--line); border-radius:20px;
    background:var(--panel); color:var(--sub); font-size:14px; font-weight:700; cursor:pointer; transition:.15s;}
  .country.active{background:var(--accent2); color:#fff; border-color:var(--accent2);}
  .country.empty{opacity:.45;}

  .chips{display:flex; gap:7px; overflow-x:auto; padding:0 0 12px; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; padding:8px 14px; border:1px solid var(--line); border-radius:20px;
    background:var(--panel); color:var(--sub); font-size:13px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap;}
  .chip.active{background:var(--accent2); color:#fff; border-color:var(--accent2);}

  #map{flex:1; width:100%; background:#dfe6e2; position:relative;}

  .searchbar{padding:10px 16px calc(10px + env(safe-area-inset-bottom)); background:var(--bg); border-top:1px solid var(--line);}
  .search{width:100%; padding:14px 16px; border:1px solid var(--line); border-radius:14px;
    background:var(--panel); font-size:15px; color:var(--ink); outline:none;}
  .search::placeholder{color:#b9ab99;}

  /* 시트: 고정 크기, 내부 세로 스크롤 + 좌우 스와이프 전환 */
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:1000;
    background:var(--panel); border-radius:20px 20px 0 0;
    box-shadow:0 -8px 30px rgba(0,0,0,.18);
    transform:translateY(110%); transition:transform .3s cubic-bezier(.2,.8,.2,1);
    height:56dvh; display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .sheet.open{transform:translateY(0);}
  .sheet-top{position:relative; padding:0 0 2px;}
  .sheet-grip{width:44px; height:5px; background:var(--line); border-radius:3px; margin:10px auto 4px;}
  .sheet-close{position:absolute; right:16px; top:8px; width:30px; height:30px; border-radius:50%;
    background:var(--bg); border:1px solid var(--line); color:var(--sub); font-size:16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .sheet-nav{display:flex; align-items:center; justify-content:center; gap:6px; padding:2px 0 4px;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--line); transition:.15s;}
  .dot.on{background:var(--accent2); width:20px; border-radius:4px;}

  .sheet-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;}
  .sheet-in{padding:4px 20px 26px;}
  .swipe-hint{text-align:center; font-size:11px; color:var(--sub); opacity:.6; margin-bottom:8px;}
  .sheet-region{font-size:13px; color:var(--accent2); font-weight:700; letter-spacing:.3px;}
  .sheet-title{font-size:24px; margin:2px 0 4px; letter-spacing:-.5px;}
  .sheet-badges{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 14px;}
  .badge{font-size:12px; font-weight:700; padding:5px 10px; border-radius:8px;}
  .badge.coe{background:#f5ecdb; color:var(--gold);}
  .badge.basic{background:#efe7db; color:var(--accent);}
  .badge.fr{background:#e7ede1; color:var(--green);}

  .facts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .fact{background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
  .fact .k{font-size:11px; color:var(--sub); font-weight:600; margin-bottom:3px;}
  .fact .v{font-size:15px; font-weight:700;}

  .bean{display:flex; align-items:center; gap:14px; background:var(--bg);
    border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:14px;}
  .bean-swatch{width:56px; height:56px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; font-size:26px;}
  .bean-desc{font-size:13px; color:var(--sub); line-height:1.5;}

  .section-h{font-size:13px; font-weight:700; color:var(--accent); margin:0 0 6px;}
  .body-t{font-size:14px; line-height:1.65; color:#5c4b3a; margin:0 0 16px;}
  .note{font-size:12px; color:var(--sub); background:#f5ecdb; border-radius:10px; padding:10px 12px; line-height:1.5;}

  .pin-label{background:var(--panel); border:1px solid var(--line); color:var(--ink);
    font-size:12px; font-weight:700; padding:3px 8px; border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.12); white-space:nowrap;}
  .pin-dot{width:16px; height:16px; border-radius:50% 50% 50% 0; background:var(--pin);
    transform:rotate(-45deg); border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.3);}
  .pin-dot.coe{background:var(--gold);}
  .pin-dim{opacity:.28;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>생두지도</h1><span>Bean Map</span></div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-cont="africa">아프리카</div>
      <div class="tab" data-cont="asia">아시아</div>
      <div class="tab" data-cont="samerica">남미</div>
    </div>
    <div class="countries" id="countries"></div>
    <div class="chips" id="chips">
      <div class="chip" data-f="basic">기본</div>
      <div class="chip" data-f="coe">COE</div>
      <div class="chip" data-f="flavor">맛·향</div>
      <div class="chip" data-f="franchise">프랜차이즈</div>
    </div>
  </header>

  <div id="map"></div>

  <div class="searchbar">
    <input class="search" id="search" placeholder="지역 검색 (예: 예가체프, 니에리, 세하도)">
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-top">
    <div class="sheet-grip"></div>
    <div class="sheet-close" id="sheetClose">✕</div>
    <div class="sheet-nav" id="sheetNav"></div>
  </div>
  <div class="sheet-scroll" id="sheetScroll">
    <div class="sheet-in" id="sheetIn"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  }
};

// 라벨 없는 타일: 국가/큰 지형만, 도시명 최소화
const map = L.map('map',{zoomControl:true, attributionControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  maxZoom:18, attribution:'&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

let markers=[];
let borderLayer=null;
let currentCont='africa';
let currentCountry=null;
let currentFilter=null;
let currentRegions=[];   // 현재 나라의 산지 배열(스와이프용)
let currentIndex=0;

function clearMarkers(){ markers.forEach(m=>map.removeLayer(m)); markers=[]; }
function clearBorder(){ if(borderLayer){ map.removeLayer(borderLayer); borderLayer=null; } }
function pinIcon(isCoe,dim){ return L.divIcon({className:'', iconSize:[16,16], iconAnchor:[8,16],
  html:'<div class="pin-dot '+(isCoe?'coe':'')+' '+(dim?'pin-dim':'')+'"></div>'}); }
function labelIcon(text,dim){ return L.divIcon({className:'', iconSize:[0,0], iconAnchor:[-12,8],
  html:'<div class="pin-label '+(dim?'pin-dim':'')+'">'+text+'</div>'}); }

function renderCountries(){
  const box=document.getElementById('countries');
  const cont=DATA[currentCont];
  const keys=Object.keys(cont.countries);
  if(keys.length===0){ box.innerHTML='<div class="country empty">준비 중</div>'; return; }
  box.innerHTML=keys.map(k=>{
    const c=cont.countries[k];
    const on=(k===currentCountry)?'active':'';
    return '<div class="country '+on+'" data-c="'+k+'">'+c.name+'</div>';
  }).join('');
}

function renderMarkers(){
  clearMarkers();
  const cont=DATA[currentCont];
  if(!currentCountry || !cont.countries[currentCountry]) return;
  const country=cont.countries[currentCountry];
  country.regions.forEach(r=>{
    const match = !currentFilter || r.tags.includes(currentFilter);
    const dim = currentFilter && !match;
    const m=L.marker(r.coord,{icon:pinIcon(r.tags.includes('coe'),dim), opacity:dim?0.5:1}).addTo(map);
    const lbl=L.marker(r.coord,{icon:labelIcon(r.title,dim), interactive:false}).addTo(map);
    if(!dim) m.on('click',()=>openSheetByRegion(r));
    markers.push(m,lbl);
  });
}

// 국경선 (색 채움 없이 테두리만) - 공개 GeoJSON
function drawBorder(iso, center, zoom){
  clearBorder();
  const url='https://raw.githubusercontent.com/johan/world.geo.json/master/countries/'+iso+'.geo.json';
  fetch(url).then(r=>r.json()).then(gj=>{
    borderLayer=L.geoJSON(gj,{style:{color:'#a9744f', weight:2.5, fill:false, dashArray:'1,6'}}).addTo(map);
  }).catch(()=>{ /* 국경 로드 실패 시 마커만 표시 */ });
}

function selectCountry(k){
  currentCountry=k;
  const c=DATA[currentCont].countries[k];
  currentRegions=c.regions;
  renderCountries();
  renderMarkers();
  drawBorder(c.iso, c.center, c.zoom);
  map.setView(c.center,c.zoom,{animate:true});
  closeSheet();
}

function selectContinent(cont){
  currentCont=cont;
  currentCountry=null;
  currentFilter=null;
  currentRegions=[];
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  renderCountries();
  clearMarkers();
  clearBorder();
  closeSheet();
  const c=DATA[cont];
  map.setView(c.center,c.zoom,{animate:true});
  const keys=Object.keys(c.countries);
  if(keys.length===1) selectCountry(keys[0]);
}

const sheet=document.getElementById('sheet');
const sheetIn=document.getElementById('sheetIn');
const sheetScroll=document.getElementById('sheetScroll');
const sheetNav=document.getElementById('sheetNav');
function closeSheet(){ sheet.classList.remove('open'); }

function openSheetByRegion(r){
  currentIndex=currentRegions.findIndex(x=>x.id===r.id);
  if(currentIndex<0) currentIndex=0;
  paintSheet();
  sheet.classList.add('open');
}

function paintSheet(){
  const r=currentRegions[currentIndex];
  const badges=[];
  if(r.tags.includes('coe')) badges.push('<span class="badge coe">COE</span>');
  if(r.tags.includes('basic')) badges.push('<span class="badge basic">기본</span>');
  if(r.tags.includes('franchise')) badges.push('<span class="badge fr">프랜차이즈</span>');
  const facts=Object.entries(r.facts).map(([k,v])=>
    '<div class="fact"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>').join('');
  const coordNote=r.coordFlag?'<div class="note">📍 '+r.coordFlag+'</div>':'';
  sheetIn.innerHTML=
    '<div class="swipe-hint">← 좌우로 밀어 다른 원산지 →</div>'+
    '<div class="sheet-region">'+r.region+'</div>'+
    '<div class="sheet-title">'+r.title+'</div>'+
    '<div class="sheet-badges">'+badges.join('')+'</div>'+
    '<div class="bean"><div class="bean-swatch" style="background:'+r.swatch+'22;border:1px solid '+r.swatch+'55">'+r.emoji+'</div>'+
    '<div class="bean-desc">'+r.beanDesc+'</div></div>'+
    '<div class="facts">'+facts+'</div>'+
    '<p class="section-h">맛 · 향</p><p class="body-t">'+r.flavor+'</p>'+
    '<p class="section-h">지역 설명</p><p class="body-t">'+r.about+'</p>'+
    coordNote;
  // 페이지 점
  sheetNav.innerHTML=currentRegions.map((x,i)=>
    '<span class="dot '+(i===currentIndex?'on':'')+'"></span>').join('');
  sheetScroll.scrollTop=0;
  // 지도도 해당 산지로 이동(시트에 안 가리게 위로 오프셋)
  map.setView([r.coord[0]-0.25, r.coord[1]], Math.max(map.getZoom(),7), {animate:true});
}

function goRegion(dir){
  if(currentRegions.length<2) return;
  currentIndex=(currentIndex+dir+currentRegions.length)%currentRegions.length;
  paintSheet();
}

// 좌우 스와이프 (스크롤 영역 위, 세로스크롤과 구분)
let sx=0, sy=0, swiping=false;
sheetScroll.addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX; sy=e.touches[0].clientY; swiping=true;
},{passive:true});
sheetScroll.addEventListener('touchend',function(e){
  if(!swiping) return; swiping=false;
  const dx=e.changedTouches[0].clientX - sx;
  const dy=e.changedTouches[0].clientY - sy;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
    goRegion(dx<0?1:-1);
  }
});
document.getElementById('sheetClose').addEventListener('click',closeSheet);

document.getElementById('tabs').addEventListener('click',function(e){
  const t=e.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  selectContinent(t.dataset.cont);
});
document.getElementById('countries').addEventListener('click',function(e){
  const c=e.target.closest('.country'); if(!c||c.classList.contains('empty')) return;
  selectCountry(c.dataset.c);
});
document.getElementById('chips').addEventListener('click',function(e){
  const c=e.target.closest('.chip'); if(!c) return;
  const f=c.dataset.f;
  if(currentFilter===f){ currentFilter=null; c.classList.remove('active'); }
  else{ currentFilter=f;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); }
  renderMarkers();
});
document.getElementById('search').addEventListener('input',function(e){
  const q=e.target.value.trim().toLowerCase(); if(!q) return;
  const cont=DATA[currentCont];
  for(const ck in cont.countries){
    const country=cont.countries[ck];
    for(const r of country.regions){
      if(r.title.toLowerCase().includes(q)||r.region.toLowerCase().includes(q)){
        if(currentCountry!==ck) selectCountry(ck);
        setTimeout(()=>openSheetByRegion(r),150); return;
      }
    }
  }
});
// 빈 지도 누르면 시트 닫힘
map.on('click',function(){ closeSheet(); });

selectContinent('africa');
</script>
</body>
</html>
