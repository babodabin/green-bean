<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="생두지도">
<meta name="theme-color" content="#3d2b1f">
<title>생두지도 Bean Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --bg:#f6efe6; --panel:#fbf6ee; --ink:#3d2b1f; --sub:#8a7a68;
    --line:#e6d9c8; --accent:#6f4e37; --accent2:#a9744f; --pin:#7a4a2b;
    --green:#5b6b3a; --gold:#b8863b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink); overflow:hidden;
  }
  #app{display:flex; flex-direction:column; height:100dvh;}

  header{padding:env(safe-area-inset-top) 16px 0; background:var(--bg); z-index:5;}
  .brand{display:flex; align-items:baseline; gap:10px; padding:14px 2px 10px;}
  .brand h1{font-size:26px; margin:0; letter-spacing:-.5px;}
  .brand span{font-size:14px; color:var(--sub); font-weight:500;}

  .tabs{display:flex; gap:7px; padding:0 0 10px;}
  .tab{flex:1; padding:12px 0; text-align:center; border:1px solid var(--line);
    border-radius:14px; background:var(--panel); color:var(--sub);
    font-size:14px; font-weight:600; cursor:pointer; transition:.15s;}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .row{display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; transition:.2s;}
  .row::-webkit-scrollbar{display:none;}
  .row:empty{display:none;}
  .countries{padding:0 0 10px;}

  .country{flex:0 0 auto; padding:9px 16px; border:1px solid var(--line); border-radius:20px;
    background:var(--panel); color:var(--sub); font-size:14px; font-weight:700; cursor:pointer; transition:.15s;}
  .country.active{background:var(--accent2); color:#fff; border-color:var(--accent2);}
  .country.empty{opacity:.45;}

  .cities{padding:0 0 10px;}
  .city{flex:0 0 auto; padding:8px 14px; border:1px solid var(--line); border-radius:20px;
    background:var(--panel); color:var(--accent); font-size:13px; font-weight:700; cursor:pointer; transition:.15s; white-space:nowrap;}
  .city.active{background:var(--pin); color:#fff; border-color:var(--pin);}
  .row.hidden{display:none !important;}

  #map{flex:1; width:100%; background:#dfe6e2; position:relative;}

  .searchbar{padding:10px 16px calc(10px + env(safe-area-inset-bottom)); background:var(--bg); border-top:1px solid var(--line);}
  .search{width:100%; padding:14px 16px; border:1px solid var(--line); border-radius:14px;
    background:var(--panel); font-size:15px; color:var(--ink); outline:none;}
  .search::placeholder{color:#b9ab99;}

  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:1000;
    background:var(--panel); border-radius:20px 20px 0 0;
    box-shadow:0 -8px 30px rgba(0,0,0,.18);
    transform:translateY(110%); transition:transform .3s cubic-bezier(.2,.8,.2,1);
    height:42dvh; display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);}
  .sheet.open{transform:translateY(0);}
  .sheet-top{position:relative; padding:0 0 2px;}
  .sheet-grip{width:44px; height:5px; background:var(--line); border-radius:3px; margin:10px auto 4px;}
  .sheet-close{position:absolute; right:16px; top:8px; width:30px; height:30px; border-radius:50%;
    background:var(--bg); border:1px solid var(--line); color:var(--sub); font-size:16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .sheet-nav{display:flex; align-items:center; justify-content:center; gap:6px; padding:2px 0 4px;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--line); transition:.15s;}
  .dot.on{background:var(--accent2); width:20px; border-radius:4px;}

  .sheet-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;}
  .sheet-in{padding:4px 20px 26px;}
  .swipe-hint{text-align:center; font-size:11px; color:var(--sub); opacity:.6; margin-bottom:8px;}
  .sheet-region{font-size:13px; color:var(--accent2); font-weight:700; letter-spacing:.3px;}
  .sheet-title{font-size:23px; margin:2px 0 4px; letter-spacing:-.5px;}
  .sheet-badges{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 12px;}
  .badge{font-size:12px; font-weight:700; padding:5px 10px; border-radius:8px;}
  .badge.coe{background:#f5ecdb; color:var(--gold);}
  .badge.basic{background:#efe7db; color:var(--accent);}
  .badge.fr{background:#e7ede1; color:var(--green);}

  .facts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .fact{background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
  .fact .k{font-size:11px; color:var(--sub); font-weight:600; margin-bottom:3px;}
  .fact .v{font-size:15px; font-weight:700;}

  .bean{display:flex; align-items:center; gap:14px; background:var(--bg);
    border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:14px;}
  .bean-swatch{width:52px; height:52px; border-radius:12px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; font-size:25px;}
  .bean-desc{font-size:13px; color:var(--sub); line-height:1.5;}

  .section-h{font-size:13px; font-weight:700; color:var(--accent); margin:0 0 6px;}
  .body-t{font-size:14px; line-height:1.65; color:#5c4b3a; margin:0 0 16px;}
  .note{font-size:12px; color:var(--sub); background:#f5ecdb; border-radius:10px; padding:10px 12px; line-height:1.5;}

  .pin-label{background:var(--panel); border:1px solid var(--line); color:var(--ink);
    font-size:12px; font-weight:700; padding:3px 8px; border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.12); white-space:nowrap; transition:opacity .2s;}
  .pin-dot{width:16px; height:16px; border-radius:50% 50% 50% 0; background:var(--pin);
    transform:rotate(-45deg); border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.3); transition:opacity .2s;}
  .pin-dot.coe{background:var(--gold);}
  .pin-dot.active{width:20px; height:20px; box-shadow:0 3px 9px rgba(0,0,0,.45); z-index:600;}
  .faded{opacity:.25 !important;}
  .clabel{background:transparent; color:var(--sub); font-size:12px; font-weight:800;
    text-shadow:0 0 3px #f6efe6,0 0 3px #f6efe6,0 0 3px #f6efe6; white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>생두지도</h1><span>Bean Map</span></div>
    <div class="tabs" id="tabs">
      <div class="tab" data-cont="africa">아프리카</div>
      <div class="tab" data-cont="asia">아시아</div>
      <div class="tab" data-cont="america">아메리카</div>
      <div class="tab" data-cont="etc">기타</div>
    </div>
    <div class="row countries hidden" id="countries"></div>
    <div class="row cities hidden" id="cities"></div>
  </header>

  <div id="map"></div>

  <div class="searchbar">
    <input class="search" id="search" placeholder="지역 검색 (예: 예가체프, 코나, 블루마운틴)">
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-top">
    <div class="sheet-grip"></div>
    <div class="sheet-close" id="sheetClose">✕</div>
    <div class="sheet-nav" id="sheetNav"></div>
  </div>
  <div class="sheet-scroll" id="sheetScroll">
    <div class="sheet-in" id="sheetIn"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const map = L.map('map',{zoomControl:true, attributionControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  maxZoom:18, attribution:'&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

let markers={};       // id -> {pin, label}
let borderLayers=[];  // 대륙 전체 국경들
let countryLabels=[]; // 대륙 뷰의 국가 이름 라벨
let currentCont=null;
let currentCountry=null;
let currentRegions=[];
let currentIndex=0;

function clearMarkers(){ Object.values(markers).forEach(o=>{map.removeLayer(o.pin); map.removeLayer(o.label);}); markers={}; }
function clearBorders(){ borderLayers.forEach(l=>map.removeLayer(l)); borderLayers=[]; }
function clearCountryLabels(){ countryLabels.forEach(l=>map.removeLayer(l)); countryLabels=[]; }
function pinIcon(isCoe){ return L.divIcon({className:'', iconSize:[16,16], iconAnchor:[8,16],
  html:'<div class="pin-dot '+(isCoe?'coe':'')+'"></div>'}); }
function labelIcon(text){ return L.divIcon({className:'', iconSize:[0,0], iconAnchor:[-12,8],
  html:'<div class="pin-label">'+text+'</div>'}); }
function countryNameIcon(text){ return L.divIcon({className:'', iconSize:[0,0], iconAnchor:[0,0],
  html:'<div class="clabel">'+text+'</div>'}); }

function loadBorder(iso, styleColor, weight){
  const url='https://raw.githubusercontent.com/johan/world.geo.json/master/countries/'+iso+'.geo.json';
  return fetch(url).then(r=>r.json()).then(gj=>{
    const layer=L.geoJSON(gj,{style:{color:styleColor,weight:weight,fill:false,dashArray:'1,6'}}).addTo(map);
    borderLayers.push(layer);
    return layer;
  }).catch(()=>null);
}

// 대륙 선택: 나라 칩만 노출
function selectContinent(cont){
  currentCont=cont;
  currentCountry=null;
  currentRegions=[];
  document.getElementById('countries').classList.remove('hidden');
  document.getElementById('cities').classList.add('hidden');
  document.getElementById('cities').innerHTML='';
  clearMarkers(); clearBorders(); clearCountryLabels(); closeSheet();
  renderCountries();

  const c=DATA[cont];
  const countries=c.countries;
  Object.values(countries).forEach(country=>{
    if(country.iso && !country.noBorder){
      loadBorder(country.iso,'#a9744f',2);
    }
    // 나라 이름 라벨(대륙 뷰)
    const lbl=L.marker(country.center,{icon:countryNameIcon(country.name), interactive:false}).addTo(map);
    countryLabels.push(lbl);
  });
  map.setView(c.center,c.zoom,{animate:true});
}

function renderCountries(){
  const box=document.getElementById('countries');
  if(!currentCont){ box.innerHTML=''; return; }
  const cont=DATA[currentCont];
  const keys=Object.keys(cont.countries);
  if(keys.length===0){ box.innerHTML='<div class="country empty">준비 중</div>'; return; }
  box.innerHTML=keys.map(k=>{
    const c=cont.countries[k];
    const on=(k===currentCountry)?'active':'';
    return '<div class="country '+on+'" data-c="'+k+'">'+c.name+'</div>';
  }).join('');
}

// 나라 선택: 국경 + 산지 마커 + 도시칩
function selectCountry(k){
  currentCountry=k;
  const c=DATA[currentCont].countries[k];
  currentRegions=c.regions;
  document.getElementById('countries').classList.remove('hidden');
  document.getElementById('cities').classList.remove('hidden');
  clearMarkers(); clearBorders(); clearCountryLabels(); closeSheet();
  renderCountries();
  renderCities();

  if(c.iso && !c.noBorder) loadBorder(c.iso,'#a9744f',2.5);
  c.regions.forEach(r=>{
    const pin=L.marker(r.coord,{icon:pinIcon(r.tags.includes('coe'))}).addTo(map);
    const label=L.marker(r.coord,{icon:labelIcon(r.title), interactive:false}).addTo(map);
    pin.on('click',()=>openSheetByRegion(r));
    markers[r.id]={pin,label};
  });
  map.setView(c.center,c.zoom,{animate:true});
}

// 도시(산지) 칩 렌더
function renderCities(){
  const box=document.getElementById('cities');
  if(!currentRegions.length){ box.innerHTML=''; return; }
  box.innerHTML=currentRegions.map(r=>
    '<div class="city" data-r="'+r.id+'">'+r.title+'</div>').join('');
}

// 도시(산지) 강조: 선택된 것만 진하게, 나머지 흐리게
function highlight(id){
  Object.entries(markers).forEach(([mid,o])=>{
    const pinEl=o.pin.getElement()?.querySelector('.pin-dot');
    const lblEl=o.label.getElement()?.querySelector('.pin-label');
    const on=(mid===id);
    if(pinEl){ pinEl.classList.toggle('faded',!on); pinEl.classList.toggle('active',on); }
    if(lblEl){ lblEl.classList.toggle('faded',!on); }
  });
}
function clearHighlight(){
  Object.values(markers).forEach(o=>{
    const pinEl=o.pin.getElement()?.querySelector('.pin-dot');
    const lblEl=o.label.getElement()?.querySelector('.pin-label');
    if(pinEl){ pinEl.classList.remove('faded','active'); }
    if(lblEl){ lblEl.classList.remove('faded'); }
  });
}

const sheet=document.getElementById('sheet');
const sheetIn=document.getElementById('sheetIn');
const sheetScroll=document.getElementById('sheetScroll');
const sheetNav=document.getElementById('sheetNav');
function closeSheet(){ sheet.classList.remove('open'); clearHighlight(); document.querySelectorAll('.city').forEach(el=>el.classList.remove('active')); }

function openSheetByRegion(r){
  currentIndex=currentRegions.findIndex(x=>x.id===r.id);
  if(currentIndex<0) currentIndex=0;
  paintSheet();
  sheet.classList.add('open');
}

function paintSheet(){
  const r=currentRegions[currentIndex];
  const badges=[];
  if(r.tags.includes('coe')) badges.push('<span class="badge coe">COE</span>');
  if(r.tags.includes('basic')) badges.push('<span class="badge basic">기본</span>');
  if(r.tags.includes('franchise')) badges.push('<span class="badge fr">프랜차이즈</span>');
  const facts=Object.entries(r.facts).map(([k,v])=>
    '<div class="fact"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>').join('');
  const coordNote=r.coordFlag?'<div class="note">📍 '+r.coordFlag+'</div>':'';
  const hint=currentRegions.length>1?'<div class="swipe-hint">← 좌우로 밀어 다른 원산지 →</div>':'';
  sheetIn.innerHTML=
    hint+
    '<div class="sheet-region">'+r.region+'</div>'+
    '<div class="sheet-title">'+r.title+'</div>'+
    '<div class="sheet-badges">'+badges.join('')+'</div>'+
    '<div class="bean"><div class="bean-swatch" style="background:'+r.swatch+'22;border:1px solid '+r.swatch+'55">'+r.emoji+'</div>'+
    '<div class="bean-desc">'+r.beanDesc+'</div></div>'+
    '<div class="facts">'+facts+'</div>'+
    '<p class="section-h">맛 · 향</p><p class="body-t">'+r.flavor+'</p>'+
    '<p class="section-h">지역 설명</p><p class="body-t">'+r.about+'</p>'+
    coordNote;
  sheetNav.innerHTML=currentRegions.map((x,i)=>
    '<span class="dot '+(i===currentIndex?'on':'')+'"></span>').join('');
  sheetScroll.scrollTop=0;
  highlight(r.id);
  document.querySelectorAll('.city').forEach(el=>el.classList.toggle('active',el.dataset.r===r.id));
  // 마커를 정확한 좌표에 두되, 시트에 안 가리도록 지도 가시영역 상단 30% 지점에 배치
  const cc=DATA[currentCont].countries[currentCountry];
  const z=cc?cc.zoom:map.getZoom();
  const mapH=document.getElementById('map').clientHeight;
  // 목표: 마커가 지도 세로 30% 위치에 오게 → 지도 중심을 마커보다 (20% 높이)만큼 아래로
  const targetPx=map.project(r.coord, z);            // 마커의 픽셀 좌표
  const shiftPx=mapH*0.20;                            // 중심을 아래로 내릴 픽셀량
  const centerPx=targetPx.add([0, shiftPx]);         // 새 지도 중심(픽셀)
  const newCenter=map.unproject(centerPx, z);        // 다시 위경도로
  map.setView(newCenter, z, {animate:true});
}

function goRegion(dir){
  if(currentRegions.length<2) return;
  currentIndex=(currentIndex+dir+currentRegions.length)%currentRegions.length;
  paintSheet();
}

let sx=0, sy=0, swiping=false;
sheetScroll.addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX; sy=e.touches[0].clientY; swiping=true;
},{passive:true});
sheetScroll.addEventListener('touchend',function(e){
  if(!swiping) return; swiping=false;
  const dx=e.changedTouches[0].clientX - sx;
  const dy=e.changedTouches[0].clientY - sy;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ goRegion(dx<0?1:-1); }
});
document.getElementById('sheetClose').addEventListener('click',closeSheet);

document.getElementById('tabs').addEventListener('click',function(e){
  const t=e.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  selectContinent(t.dataset.cont);
});
document.getElementById('countries').addEventListener('click',function(e){
  const c=e.target.closest('.country'); if(!c||c.classList.contains('empty')) return;
  selectCountry(c.dataset.c);
});
document.getElementById('cities').addEventListener('click',function(e){
  const c=e.target.closest('.city'); if(!c) return;
  const r=currentRegions.find(x=>x.id===c.dataset.r); if(!r) return;
  openSheetByRegion(r);
});
document.getElementById('search').addEventListener('input',function(e){
  const q=e.target.value.trim().toLowerCase(); if(!q) return;
  for(const contKey in DATA){
    const cont=DATA[contKey];
    for(const ck in cont.countries){
      const country=cont.countries[ck];
      for(const r of country.regions){
        if(r.title.toLowerCase().includes(q)||r.region.toLowerCase().includes(q)){
          if(currentCont!==contKey){
            document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.cont===contKey));
            currentCont=contKey;
          }
          selectCountry(ck);
          setTimeout(()=>openSheetByRegion(r),350); return;
        }
      }
    }
  }
});
map.on('click',function(){ closeSheet(); });

// 초기: 첫 화면엔 4개 대륙만. 아무 대륙도 선택 안 함(빈 지도).
map.setView([20,10],2);
</script>
